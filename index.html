<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGAP - SMAN 1 PARUNG</title>
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel untuk menjalankan JSX di Browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        // Mengambil icon dari library Lucide
        const { 
            Bell, Camera, MapPin, Calendar, Clock, User, LogOut, FileText, Check,
            Info, Eye, EyeOff, Loader2, X, History, Send, Map: MapIcon,
            ChevronRight, Briefcase, Building2, UserCheck, Settings, PieChart,
            AlertCircle, Filter
        } = lucide;

        const API_URL = "https://script.google.com/macros/s/AKfycbynJdhga2-7t-VBvFHvqx_llo4s78-9_l9oQw6BUiFxmT6Sgt-M9I20J1mWWojdiW_rew/exec";

        const App = () => {
            // --- COPY PASTE SELURUH ISI FUNCTION APP DARI KODE KAMU DI SINI ---
            // (Saya ringkas bagian state untuk contoh, pastikan masukkan kode lengkapmu)
            
            const [user, setUser] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState('home');
            const [currentTime, setCurrentTime] = React.useState(new Date());
            const [nip, setNip] = React.useState('');
            const [isLoading, setIsLoading] = React.useState(false);
            const [loginError, setLoginError] = React.useState('');

            React.useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const handleLogin = async () => {
                setIsLoading(true);
                try {
                    const resp = await fetch(`${API_URL}?op=login&nip=${nip}`);
                    const res = await resp.json();
                    if (res.status === "success") {
                        setUser({ ...res.data, foto: `https://api.dicebear.com/7.x/avataaars/svg?seed=${res.data.nama}` });
                    } else {
                        setLoginError('NIP tidak ditemukan');
                    }
                } catch (e) {
                    // Bypass untuk demo sesuai request kode asli
                    if (nip === '12345') {
                        setUser({ nama: "Drs. Budi Santoso", nip: "12345", jabatan: "Guru", foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Budi" });
                    } else {
                        setLoginError('Koneksi Gagal. Gunakan 12345');
                    }
                } finally {
                    setIsLoading(false);
                }
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">
                            <div className="bg-blue-600 p-10 text-center">
                                <h1 className="text-white text-3xl font-black italic uppercase">Sigap</h1>
                                <p className="text-blue-100 text-[10px] font-bold">SMAN 1 PARUNG</p>
                            </div>
                            <div className="p-8 space-y-4">
                                <input 
                                    type="text" 
                                    placeholder="NIP Anda" 
                                    className="w-full p-4 bg-slate-50 border rounded-2xl outline-none"
                                    value={nip}
                                    onChange={(e) => setNip(e.target.value)}
                                />
                                {loginError && <p className="text-red-500 text-xs">{loginError}</p>}
                                <button onClick={handleLogin} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold">
                                    {isLoading ? "Loading..." : "MASUK"}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-24">
                    <div className="bg-white p-4 shadow-sm flex justify-between items-center">
                        <h2 className="font-bold text-sm">{user.nama}</h2>
                        <button onClick={() => setUser(null)} className="text-red-500"><LogOut size={18}/></button>
                    </div>
                    <div className="p-6">
                        <div className="bg-blue-600 p-6 rounded-[2rem] text-white shadow-lg">
                            <p className="text-xs opacity-70">Waktu Saat Ini</p>
                            <h1 className="text-4xl font-black">{currentTime.toLocaleTimeString()}</h1>
                        </div>
                        <div className="mt-6 grid grid-cols-2 gap-4">
                             <div className="bg-white p-4 rounded-2xl border text-center">
                                <p className="text-[10px] font-bold text-slate-400">ABSEN MASUK</p>
                                <button className="mt-2 w-12 h-12 bg-blue-600 rounded-full mx-auto flex items-center justify-center text-white">
                                    <Camera size={20}/>
                                </button>
                             </div>
                             <div className="bg-white p-4 rounded-2xl border text-center">
                                <p className="text-[10px] font-bold text-slate-400">ABSEN PULANG</p>
                                <button className="mt-2 w-12 h-12 bg-slate-200 rounded-full mx-auto flex items-center justify-center text-slate-400">
                                    <LogOut size={20}/>
                                </button>
                             </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
